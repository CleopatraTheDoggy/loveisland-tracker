<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Follower Tracker</title>
    
    <script defer src="https://cloud.umami.is/script.js" data-website-id="d4044f68-b37e-4710-9c74-4a7936a3719c"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body class="text-slate-800 flex flex-col bg-slate-50 min-h-screen lg:h-screen lg:overflow-hidden">

    <header class="bg-white border-b border-slate-200 px-4 lg:px-6 py-4 flex items-center justify-between sticky top-0 z-10">
        <div>
            <h1 class="text-xl lg:text-2xl font-bold text-slate-900">Follower Growth Dashboard</h1>
            <p class="text-xs lg:text-sm text-slate-500">Live Data of LoveIsland Contestants USA S8</p>
        </div>
        <div id="status-badge" class="bg-blue-50 text-blue-700 text-xs font-semibold px-3 py-1 rounded-full border border-blue-200 flex items-center gap-2">
            <svg class="animate-spin h-3 w-3 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span class="hidden lg:inline">Fetching Data...</span>
            <span class="lg:hidden">Loading...</span>
        </div>
    </header>

    <main class="flex-1 flex flex-col lg:flex-row w-full lg:overflow-hidden">
        
        <div class="flex-1 p-3 lg:p-6 flex flex-col bg-slate-50 min-h-[500px] lg:min-h-0">
            <div class="bg-white p-3 lg:p-4 rounded-xl border border-slate-200 shadow-sm flex-1 flex flex-col relative h-full">
                
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-slate-800">Followers Over Time</h2>
                    <div class="flex bg-slate-100 p-1 rounded-lg">
                        <button id="tab-original" class="px-3 py-1.5 text-sm font-medium rounded-md bg-white shadow-sm text-slate-800 transition-all">Original</button>
                        <button id="tab-casa-amor" class="px-3 py-1.5 text-sm font-medium rounded-md text-slate-500 hover:text-slate-700 transition-all">Casa Amor</button>
                    </div>
                </div>

                <div class="flex-1 relative w-full h-full min-h-[350px] lg:min-h-0">
                    <canvas id="followerChart"></canvas>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-96 bg-white border-t lg:border-t-0 lg:border-l border-slate-200 flex flex-col flex-shrink-0 lg:h-full lg:overflow-hidden">
            <div class="p-4 lg:p-6 border-b border-slate-100">
                <h2 class="text-lg font-semibold text-slate-800">Growth Ranking</h2>
                <p class="text-sm text-slate-500">Total increase since tracking began</p>
            </div>
            
            <div id="ranking-container" class="flex-1 lg:overflow-y-auto p-4 space-y-3 scrollbar-hide">
                <div class="animate-pulse flex items-center p-3 rounded-lg border border-slate-100 bg-slate-50">
                    <div class="rounded-full bg-slate-200 h-10 w-10"></div>
                    <div class="ml-4 flex-1 space-y-2">
                        <div class="h-4 bg-slate-200 rounded w-1/2"></div>
                        <div class="h-3 bg-slate-200 rounded w-1/3"></div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
