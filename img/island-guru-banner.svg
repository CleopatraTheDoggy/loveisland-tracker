<svg viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" width="680" height="340" role="img" aria-label="Island.Guru animated logo">
  <defs>

    <!-- Pink text gradient matching .site-title -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#de81c2"/>
      <stop offset="35%"  stop-color="#ff4aac"/>
      <stop offset="60%"  stop-color="#de81c2"/>
      <stop offset="100%" stop-color="#ff8aea"/>
    </linearGradient>

    <!-- Gold heart gradient -->
    <radialGradient id="hg" cx="50%" cy="42%" r="60%">
      <stop offset="0%"   stop-color="#FFE066"/>
      <stop offset="35%"  stop-color="#FFB700"/>
      <stop offset="65%"  stop-color="#E08A00"/>
      <stop offset="100%" stop-color="#C46A00"/>
    </radialGradient>
    <radialGradient id="hgShine" cx="35%" cy="28%" r="50%">
      <stop offset="0%"   stop-color="#FFF6CC" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFD000" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip path for the text reveal — heart sweeps it open left-to-right -->
    <clipPath id="textReveal">
      <rect id="revealRect" x="-680" y="0" width="680" height="340">
        <animate
          attributeName="x"
          from="-680" to="0"
          dur="2.2s"
          begin="0.3s"
          fill="freeze"
          calcMode="spline"
          keyTimes="0;1"
          keySplines="0.42 0 0.58 1"/>
      </rect>
    </clipPath>

    <!-- Star/sparkle shape for decorative stars -->
    <polygon id="star4" points="0,-5 1.2,-1.2 5,0 1.2,1.2 0,5 -1.2,1.2 -5,0 -1.2,-1.2" fill="#FFE566"/>

    <!-- Filters -->
    <filter id="heartGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="2.5" in="SourceGraphic" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!-- ── Decorative stars scattered in background ── -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="0.6" dur="1s" begin="0.1s" fill="freeze"/>
    <!-- Small dots -->
    <circle cx="60"  cy="45"  r="1.5" fill="#de81c2" opacity="0.5"/>
    <circle cx="140" cy="28"  r="1"   fill="#ff4aac" opacity="0.4"/>
    <circle cx="240" cy="55"  r="1.2" fill="#de81c2" opacity="0.35"/>
    <circle cx="360" cy="22"  r="1.5" fill="#ff4aac" opacity="0.5"/>
    <circle cx="460" cy="50"  r="1"   fill="#de81c2" opacity="0.4"/>
    <circle cx="570" cy="35"  r="1.5" fill="#ff4aac" opacity="0.35"/>
    <circle cx="620" cy="60"  r="1"   fill="#de81c2" opacity="0.5"/>
    <circle cx="90"  cy="290" r="1.5" fill="#de81c2" opacity="0.35"/>
    <circle cx="200" cy="305" r="1"   fill="#ff4aac" opacity="0.4"/>
    <circle cx="420" cy="295" r="1.5" fill="#de81c2" opacity="0.35"/>
    <circle cx="600" cy="300" r="1"   fill="#ff4aac" opacity="0.5"/>
    <circle cx="50"  cy="170" r="1"   fill="#de81c2" opacity="0.3"/>
    <circle cx="630" cy="165" r="1.2" fill="#ff4aac" opacity="0.35"/>
    <!-- 4-point stars -->
    <use href="#star4" transform="translate(30,80)  scale(0.6)"  fill="#de81c2" opacity="0.4"/>
    <use href="#star4" transform="translate(648,90) scale(0.5)"  fill="#ff4aac" opacity="0.35"/>
    <use href="#star4" transform="translate(20,240) scale(0.5)"  fill="#de81c2" opacity="0.3"/>
    <use href="#star4" transform="translate(660,240) scale(0.6)" fill="#ff4aac" opacity="0.35"/>
    <use href="#star4" transform="translate(340,18) scale(0.7)"  fill="#FFB700" opacity="0.45"/>
  </g>

  <!-- ── Horizontal glow line (Love Island-esque divider) ── -->
  <line x1="80" y1="220" x2="600" y2="220" stroke="url(#textGrad)" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" from="0" to="0.35" dur="0.8s" begin="2.2s" fill="freeze"/>
  </line>

  <!-- ── Tagline below title ── -->
  <text
    x="340" y="255"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="15"
    letter-spacing="3"
    fill="#de81c2"
    opacity="0">
    LOVE ISLAND USA · SEASON 8 · FOLLOWER TRACKER
    <animate attributeName="opacity" from="0" to="0.75" dur="0.8s" begin="2.4s" fill="freeze"/>
  </text>

  <!-- ── Season/location badge ── -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="2.6s" fill="freeze"/>
    <rect x="258" y="268" width="164" height="22" rx="11" fill="none" stroke="#ff4aac" stroke-width="0.8" opacity="0.5"/>
    <text x="340" y="283" text-anchor="middle" font-family="Georgia, serif" font-size="11" letter-spacing="2" fill="#ff8aea" opacity="0.9">🌴 FIJI 2026 🌴</text>
  </g>

  <!-- ── MAIN TITLE (pink gradient, revealed by clip) ── -->
  <g filter="url(#textGlow)" clip-path="url(#textReveal)">
    <text
      x="340" y="195"
      text-anchor="middle"
      font-family="Pacifico, 'Comic Sans MS', cursive"
      font-size="90"
      fill="url(#textGrad)"
      letter-spacing="1">
      Island.Guru
    </text>
  </g>

  <!-- ── HEART GROUP — sweeps across the title ── -->
  <g id="heartGroup" filter="url(#heartGlow)" opacity="0">
    <!-- Snap visible exactly when the sweep begins -->
    <animate attributeName="opacity" from="0" to="1" dur="0.001s" begin="0.3s" fill="freeze"/>
    <!-- Snap invisible once it exits right edge -->
    <animate attributeName="opacity" from="1" to="0" dur="0.001s" begin="2.5s" fill="freeze"/>
    <!-- Heart travels from left off-screen to right off-screen, centered vertically on text baseline -->
    <animateTransform
      attributeName="transform"
      type="translate"
      from="-80,170"
      to="760,170"
      dur="2.2s"
      begin="0.3s"
      fill="freeze"
      calcMode="spline"
      keyTimes="0;1"
      keySplines="0.42 0 0.58 1"/>

    <!-- Heart SVG (centered at 0,0, same proportions as original 90×84 viewBox) -->
    <g transform="translate(-40,-40) scale(0.89)">
      <!-- Heart body -->
      <path d="M45 74 C45 74 6 50 6 27 C6 15 15 6 27 6 C35 6 42 10 45 17 C48 10 55 6 63 6 C75 6 84 15 84 27 C84 50 45 74 45 74Z" fill="url(#hg)"/>
      <!-- Shine -->
      <path d="M45 74 C45 74 6 50 6 27 C6 15 15 6 27 6 C35 6 42 10 45 17 C48 10 55 6 63 6 C75 6 84 15 84 27 C84 50 45 74 45 74Z" fill="url(#hgShine)"/>

      <!-- Inner shimmer dots -->
      <g>
        <ellipse cx="22" cy="22" rx="2.5" ry="2.5" fill="#FFF8CC" opacity="0.9">
          <animate attributeName="opacity" values="0.9;0.3;1;0.6;0.9" dur="1.1s" begin="0.3s" repeatCount="1" fill="freeze"/>
        </ellipse>
        <ellipse cx="35" cy="14" rx="2"   ry="2"   fill="#FFE566" opacity="0.85">
          <animate attributeName="opacity" values="0.85;1;0.4;0.85" dur="1.1s" begin="0.5s" repeatCount="1" fill="freeze"/>
        </ellipse>
        <ellipse cx="55" cy="16" rx="2.5" ry="2.5" fill="#FFFFFF" opacity="0.95">
          <animate attributeName="opacity" values="0.95;0.4;1;0.7;0.95" dur="1.1s" begin="0.2s" repeatCount="1" fill="freeze"/>
        </ellipse>
        <ellipse cx="68" cy="24" rx="2"   ry="2"   fill="#FFE566" opacity="0.8">
          <animate attributeName="opacity" values="0.8;1;0.35;0.8" dur="1.1s" begin="0.7s" repeatCount="1" fill="freeze"/>
        </ellipse>
        <ellipse cx="45" cy="38" rx="1.8" ry="1.8" fill="#FFFFFF" opacity="0.9">
          <animate attributeName="opacity" values="0.9;0.4;1;0.9" dur="1.1s" begin="0.4s" repeatCount="1" fill="freeze"/>
        </ellipse>
        <ellipse cx="30" cy="48" rx="2"   ry="2"   fill="#FFE566" opacity="0.85">
          <animate attributeName="opacity" values="0.85;0.3;0.9;0.85" dur="1.1s" begin="0.6s" repeatCount="1" fill="freeze"/>
        </ellipse>
      </g>

      <!-- Heartbeat scale pulse -->
      <animateTransform
        attributeName="transform"
        type="scale"
        additive="sum"
        values="1 1;1.08 1.08;0.97 0.97;1 1"
        keyTimes="0;0.4;0.7;1"
        dur="0.9s"
        repeatCount="2"
        fill="freeze"/>

      <!-- Sparkles around the heart corners -->
      <!-- Top-left sparkle -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="1.4s" begin="0.4s" repeatCount="1" fill="freeze"/>
        <line x1="10" y1="10" x2="10" y2="4"  stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="7"  y1="13" x2="2"  y2="13" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
      </g>
      <!-- Top-right sparkle -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="1.2s" begin="0.8s" repeatCount="1" fill="freeze"/>
        <line x1="78" y1="8"  x2="78" y2="2"  stroke="#FFE566" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="75" y1="11" x2="70" y2="11" stroke="#FFE566" stroke-width="1.5" stroke-linecap="round"/>
      </g>
      <!-- Bottom-right sparkle -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0.3s" repeatCount="1" fill="freeze"/>
        <line x1="82" y1="50" x2="82" y2="44" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="79" y1="53" x2="74" y2="53" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
      </g>
      <!-- Bottom-left sparkle -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="1.3s" begin="0.6s" repeatCount="1" fill="freeze"/>
        <line x1="8" y1="56" x2="8"  y2="50" stroke="#FFE566" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="5" y1="59" x2="0"  y2="59" stroke="#FFE566" stroke-width="1.3" stroke-linecap="round"/>
      </g>

    </g>
  </g>

  <!-- ── Heart glow trail (gold shimmer left behind the heart) ── -->
  <rect x="0" y="155" width="0" height="50" fill="url(#hg)" opacity="0.07" rx="4">
    <animate attributeName="width"
      from="0" to="680"
      dur="2.2s" begin="0.3s" fill="freeze"
      calcMode="spline" keyTimes="0;1" keySplines="0.42 0 0.58 1"/>
  </rect>

</svg>
